name: ⛑️ Code quality

on:
  push:
  pull_request:

permissions:
  checks: write
  contents: write

concurrency:
  cancel-in-progress: true
  group: lint-${{ github.ref }}

jobs:
    quality:
      runs-on: ubuntu-latest
      permissions:
        contents: read
      steps:
        - name: Checkout
          uses: actions/checkout@v5
          with:
            persist-credentials: false
        - name: Setup Biome
          uses: biomejs/setup-biome@v2
          with:
            version: latest
        - name: Run Biome
          run: biome ci . --formatter-enabled=false